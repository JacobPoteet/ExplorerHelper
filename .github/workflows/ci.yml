name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Build
        run: dotnet build ExplorerHelper.sln -c Release

      - name: Publish (smoke test the packaging path)
        run: ./build.ps1 -Version 0.0.0-ci

      - uses: actions/upload-artifact@v5
        with:
          name: ExplorerHelper-ci
          path: artifacts/*.zip
